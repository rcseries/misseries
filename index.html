<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Tracker</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Estilos personalizados -->
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-tv me-2"></i>Series Tracker
            </span>
            <button class="btn btn-primary" onclick="abrirModalAgregar()">
                <i class="fas fa-plus me-1"></i> Nueva Serie
            </button>
        </div>
    </nav>

    <div class="container">
        <!-- Navegación de categorías -->
        <ul class="nav nav-pills mb-4 categorias-nav" id="categoriasTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" data-categoria="pendiente_estreno">
                    <i class="fas fa-clock me-1"></i> Pendientes de Estreno
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-categoria="en_emision">
                    <i class="fas fa-play me-1"></i> En Emisión
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-categoria="a_medias">
                    <i class="fas fa-pause me-1"></i> A Medias
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-categoria="pendientes">
                    <i class="fas fa-bookmark me-1"></i> Pendientes
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" data-categoria="vistas">
                    <i class="fas fa-check me-1"></i> Vistas
                </button>
            </li>
        </ul>

        <!-- Contenedor de series -->
        <div id="series-container">
            <!-- Las tarjetas se generan dinámicamente aquí -->
        </div>
    </div>

    <!-- Modal para Agregar/Editar Serie -->
    <div class="modal fade" id="modalSerie" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="modalTitulo">Nueva Serie</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="formSerie">
                        <input type="hidden" id="serieId">
                        
                        <!-- Título -->
                        <div class="mb-3">
                            <label class="form-label">Título *</label>
                            <input type="text" class="form-control bg-dark text-white" id="titulo" required>
                        </div>

                        <!-- Categoría -->
                        <div class="mb-3">
                            <label class="form-label">Categoría *</label>
                            <select class="form-select bg-dark text-white" id="categoria" required>
                                <option value="pendiente_estreno">Pendiente de Estreno</option>
                                <option value="en_emision">En Emisión</option>
                                <option value="a_medias">A Medias</option>
                                <option value="pendientes">Pendientes</option>
                                <option value="vistas">Vistas</option>
                            </select>
                        </div>

                        <!-- Portada -->
                        <div class="mb-3">
                            <label class="form-label">URL de Portada</label>
                            <input type="url" class="form-control bg-dark text-white" id="portada" placeholder="https://...">
                        </div>

                        <!-- Campos específicos por categoría -->
                        <div id="camposExtras">
                            <!-- Se llenan dinámicamente según la categoría -->
                        </div>

                        <!-- Botones -->
                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal para Checklist de Capítulos -->
    <div class="modal fade" id="modalChecklist" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Checklist de Capítulos</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="checklistBody">
                    <!-- Se llena dinámicamente -->
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    
    <!-- Scripts de la aplicación -->
    <script src="js/config.js"></script>
    <script src="js/checklist.js"></script>
    <script src="js/series.js"></script>
    <script src="js/imageManager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
