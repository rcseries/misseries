<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Series Tracker – Calendario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" type="image/png" href="/misseries/favicon.png">
    <link rel="manifest" href="/misseries/manifest.json">
    <meta name="theme-color" content="#e94560">
    <link rel="apple-touch-icon" href="/misseries/favicon.png">
    <style>
        .calendario-container { max-width: 900px; margin: 0 auto; }
        .evento-item {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid var(--accent);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .evento-fecha {
            text-align: center;
            min-width: 60px;
            font-weight: bold;
        }
        .evento-dia { font-size: 1.5rem; color: var(--accent); }
        .evento-mes { font-size: 0.8rem; text-transform: uppercase; }
        .evento-info { flex: 1; }
        .evento-titulo { font-weight: bold; margin-bottom: 3px; }
        .evento-tipo {
            font-size: 0.75rem;
            padding: 3px 10px;
            border-radius: 12px;
            display: inline-block;
        }
        .tipo-estreno { background: #e94560; color: white; }
        .tipo-capitulo { background: #0d6efd; color: white; }
        .sin-eventos {
            text-align: center;
            padding: 3rem;
            color: var(--text-secondary);
        }
        h3 { color: var(--accent); margin: 1.5rem 0 1rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid px-3">
            <span class="navbar-brand mb-0 h1">
                <i class="fas fa-calendar me-2"></i>Calendario de Estrenos
            </span>
            <div class="d-flex gap-2">
                <button class="btn btn-sm btn-outline-light" onclick="window.location.href='pendiente_estreno.html'">
                    <i class="fas fa-arrow-left me-1"></i> Volver
                </button>
                <button class="btn btn-sm btn-outline-danger" onclick="cerrarSesion()" title="Cerrar sesión">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <div class="container calendario-container">
        <h3><i class="fas fa-clock me-2"></i>Próximos 30 días</h3>
        <div id="eventos-proximos"></div>
        
        <h3 class="mt-4"><i class="fas fa-calendar-check me-2"></i>Todos los estrenos</h3>
        <div id="eventos-todos"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/config.js"></script>
    <script src="js/checklist.js"></script>
    <script src="js/series.js"></script>
    <script>
        const MESES = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

        async function cargarCalendario() {
            const snapshot = await seriesRef.get();
            const eventos = [];

            snapshot.forEach(doc => {
                const serie = { id: doc.id, ...doc.data() };

                // Estrenos
                if ((serie.categoria === 'pendiente_estreno' || serie.categoria === 'en_emision') && serie.fecha_estreno) {
                    eventos.push({
                        fecha: parseFecha(serie.fecha_estreno),
                        titulo: serie.titulo,
                        tipo: 'estreno',
                        categoria: serie.categoria === 'pendiente_estreno' ? 'Próximo estreno' : 'En emisión',
                        descripcion: `🎬 Estreno de ${serie.titulo}`
                    });
                }

                // Capítulos
                if (serie.categoria === 'en_emision' && serie.capitulos_checklist) {
                    let caps = serie.capitulos_checklist;
                    if (typeof caps === 'string') caps = JSON.parse(caps);
                    caps.filter(c => !c.visto).forEach(cap => {
                        eventos.push({
                            fecha: parseFecha(cap.fecha),
                            titulo: serie.titulo,
                            tipo: 'capitulo',
                            categoria: `Capítulo ${cap.numero}`,
                            descripcion: `📺 ${serie.titulo} - Capítulo ${cap.numero}`
                        });
                    });
                }
            });

            // Ordenar por fecha
            eventos.sort((a, b) => a.fecha - b.fecha);

            return eventos;
        }

        function parseFecha(fechaStr) {
            if (!fechaStr) return null;
            if (fechaStr.toDate) fechaStr = fechaStr.toDate().toISOString();
            const str = fechaStr.split('T')[0];
            const [y, m, d] = str.split('-').map(Number);
            return new Date(y, m - 1, d);
        }

        function renderEventos(eventos, contenedorId, limiteDias = null) {
            const contenedor = document.getElementById(contenedorId);
            const hoy = new Date();
            hoy.setHours(0, 0, 0, 0);
            const limite = limiteDias ? new Date(hoy.getTime() + limiteDias * 86400000) : null;

            let eventosFiltrados = eventos.filter(e => e.fecha >= hoy);
            if (limite) eventosFiltrados = eventosFiltrados.filter(e => e.fecha <= limite);

            if (eventosFiltrados.length === 0) {
                contenedor.innerHTML = '<div class="sin-eventos">No hay eventos próximos</div>';
                return;
            }

            contenedor.innerHTML = eventosFiltrados.map(e => `
                <div class="evento-item">
                    <div class="evento-fecha">
                        <div class="evento-dia">${e.fecha.getDate()}</div>
                        <div class="evento-mes">${MESES[e.fecha.getMonth()]}</div>
                    </div>
                    <div class="evento-info">
                        <div class="evento-titulo">${e.descripcion}</div>
                        <span class="evento-tipo ${e.tipo === 'estreno' ? 'tipo-estreno' : 'tipo-capitulo'}">${e.categoria}</span>
                    </div>
                </div>
            `).join('');
        }

        (async () => {
            const eventos = await cargarCalendario();
            renderEventos(eventos, 'eventos-proximos', 30);
            renderEventos(eventos, 'eventos-todos');
        })();
    </script>
</body>
</html>
