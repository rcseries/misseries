<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Firebase Connection</title>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .test-container {
            background: #16213e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
        }
        .success { color: #00ff00; }
        .error { color: #ff4444; }
        button {
            background: #e94560;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px;
        }
    </style>
</head>
<body>
    <div class="test-container">
        <h2>🧪 Test de Conexión Firebase</h2>
        <div id="status">Verificando conexión...</div>
        <button onclick="testConexion()">Probar Conexión</button>
        <button onclick="agregarSeriePrueba()">Agregar Serie de Prueba</button>
        <div id="resultado"></div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore-compat.js"></script>
    
    <!-- Tu configuración -->
    <script>
        // Copia aquí tu config.js completo
        const firebaseConfig = {
            apiKey: "AIzaSyDKLUWmgqjFqhp8CBvX1IgP0qpWV2l17JY",
            authDomain: "series-tracker-a8953.firebaseapp.com",
            projectId: "series-tracker-a8953",
            storageBucket: "series-tracker-a8953.firebasestorage.app",
            messagingSenderId: "267875236634",
            appId: "1:267875236634:web:c9a397bf4b97132cf60aa3"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        console.log('Firebase inicializado');

        function testConexion() {
            document.getElementById('status').innerHTML = '⏳ Probando conexión...';
            
            db.collection('test').doc('connection-test').set({
                mensaje: 'Conexión exitosa',
                timestamp: new Date().toISOString()
            })
            .then(() => {
                document.getElementById('status').innerHTML = '<span class="success">✅ CONEXIÓN EXITOSA</span>';
                document.getElementById('resultado').innerHTML = 'Firestore funciona correctamente';
                
                // Limpiar documento de prueba
                return db.collection('test').doc('connection-test').delete();
            })
            .catch((error) => {
                document.getElementById('status').innerHTML = '<span class="error">❌ ERROR DE CONEXIÓN</span>';
                document.getElementById('resultado').innerHTML = `Error: ${error.message}`;
            });
        }

        function agregarSeriePrueba() {
            document.getElementById('status').innerHTML = '⏳ Agregando serie de prueba...';
            
            const seriePrueba = {
                titulo: "Serie de Prueba " + new Date().toLocaleTimeString(),
                categoria: "pendientes",
                fecha_registro: new Date().toISOString(),
                portada: ""
            };
            
            db.collection('series').add(seriePrueba)
            .then((docRef) => {
                document.getElementById('status').innerHTML = '<span class="success">✅ SERIE AGREGADA</span>';
                document.getElementById('resultado').innerHTML = `ID: ${docRef.id}`;
                
                // Eliminar serie de prueba después de 3 segundos
                setTimeout(() => {
                    db.collection('series').doc(docRef.id).delete()
                    .then(() => {
                        document.getElementById('resultado').innerHTML += '<br>Serie de prueba eliminada automáticamente';
                    });
                }, 3000);
            })
            .catch((error) => {
                document.getElementById('status').innerHTML = '<span class="error">❌ ERROR</span>';
                document.getElementById('resultado').innerHTML = `Error: ${error.message}`;
            });
        }
    </script>
</body>
</html>
